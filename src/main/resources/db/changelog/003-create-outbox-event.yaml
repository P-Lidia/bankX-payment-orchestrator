databaseChangeLog:
  - changeSet:
      id: create-outbox-events
      author: P-Lidia
      changes:
        - createTable:
            tableName: outbox_events
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: correlation_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: VARCHAR(100)
                  defaultValue: "TRANSFER_CREATED"
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: JSONB
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: "NEW"
                  constraints:
                    nullable: false
              - column:
                  name: create_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: "NOW()"
                  constraints:
                    nullable: false
              - column:
                  name: update_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: "NOW()"
                  constraints:
                    nullable: false
              - column:
                  name: retry_count
                  type: INTEGER
                  defaultValue: "0"
                  constraints:
                    nullable: false
              - column:
                  name: error_message
                  type: VARCHAR(512)
                  constraints:
                    nullable: true
        - createIndex:
            indexName: idx_outbox_status
            tableName: outbox_events
            columns:
              - column:
                  name: status