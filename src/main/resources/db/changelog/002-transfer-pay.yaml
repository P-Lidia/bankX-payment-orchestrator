databaseChangeLog:
  - changeSet:
      id: create-transfer-pay
      author: marrgosha
      changes:
        - createTable:
            tableName: transfer_pay
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
              - column:
                  name: request_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: correlation_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: from_account_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: to_account_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: DECIMAL(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: metadata
                  type: jsonb
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: CREATED
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  defaultValueComputed: "NOW()"
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  defaultValueComputed: "NOW()"
        - addForeignKeyConstraint:
            baseTableName: transfer_pay
            baseColumnNames: request_id
            referencedTableName: idempotency_requests
            referencedColumnNames: request_id
            constraintName: fk_transfer_pay_idempotency_requests
        - createIndex:
            tableName: transfer_pay
            indexName: idx_correlation_id
            columns:
              - column:
                  name: correlation_id

